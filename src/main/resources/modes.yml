modes:
  # Single sample mode; duplicate and rename this section to add more modes.
  classic:
    icon: DIAMOND_SWORD
    displayName: "Classic 1v1"
    # Optional per-mode GUI slots (priority higher than config.yml mode-slots)
    # gui:
    #   main-slot: 10
    #   duel-slot: 12
    # Optional map binding for this mode (leave empty = all arenas allowed)
    # arena: arena1                   # single arena (same as arenas: [arena1])
    arenas: []                        # multiple arenas, only these will be matched
                                       # example: [arena1, arena2, pvp01]
    lore:
      - "§7Standard PvP duel"
    settings:
      maxHealth: 20.0
      hunger: 20
      saturation: 5.0
      noDamageTicks: 10
      pvp: "1.9"  # Legacy 1.8 PvP support was removed; use vanilla cooldown.
      rounds-to-win: 1            # Best-of style. Example: 2 means BO3
      next-round-delay-seconds: 0 # Delay before starting next round (after round result/title)
      winner-leave-delay-seconds: 0 # Final win後，勝者留在場內撿裝秒數（0=立即結束）
      inventory:
        # restore-backup: true  = match end restores pre-match snapshot
        # restore-backup: false = keep match result inventory (no snapshot restore)
        # drop-on-final-round-only: true = in multi-round mode, only final deciding round drops inventory
        restore-backup: true
      arena: [pvp2]
      build:
        enabled: true             # Allow block place/break during fights; arena is rolled back automatically.
        break-placed-only: false  # true=only blocks placed during this match can be broken (protect arena map)
      rollback:
        enabled: true             # false=disable arena snapshot/rollback pipeline for this mode (lowest lag, no map restore)
      spectator:
        enabled: true
        eliminated-can-spectate: true  # dead players in team/round mode can spectate current round
        public-enabled: true           # players outside match can spectate
    kitRef: ''

  # Example no-kit drop mode:
  # - Omit both kitRef and kit section => use player's own inventory to fight
  # - With restore-backup: false, death drops items and match end won't restore snapshots
  # drop_mode:
  #   icon: IRON_SWORD
  #   displayName: "Drop Inventory"
  #   lore:
  #     - "§cNo kit, use your own inventory"
  #   settings:
  #     rounds-to-win: 1
  #     next-round-delay-seconds: 0
  #     inventory:
  #       drop-on-final-round-only: false
  #       restore-backup: false
